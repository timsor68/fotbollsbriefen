<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fotbollsbriefen</title>
<style>
:root{--bg:#eef2f4;--paper:#fff;--ink:#13202a;--muted:#687680;--line:#dbe2e7;--green:#075f37;--deep:#07301e}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif}
header{position:sticky;top:0;z-index:20;background:var(--deep);color:#fff;box-shadow:0 3px 16px #0004}
.top{max-width:1420px;margin:auto;padding:16px 22px 11px;display:flex;gap:18px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.brand{display:flex;gap:11px;align-items:center}.logo{width:43px;height:43px;border-radius:50%;display:grid;place-items:center;background:#168b50;font-size:23px}
h1{font-size:29px;line-height:1;margin:0}.tag{font-size:13px;color:#cde8d8;margin-top:5px}
.actions{display:flex;gap:9px;align-items:center;flex:1;justify-content:flex-end;max-width:720px}.search{flex:1;min-width:240px}
.search input{width:100%;border:0;border-radius:9px;padding:12px 14px;font-size:15px}
.refresh{border:0;border-radius:9px;padding:12px 15px;background:#fff;color:var(--deep);font-weight:700;cursor:pointer}
nav{max-width:1420px;margin:auto;padding:0 22px 13px;display:flex;gap:8px;overflow-x:auto}
.filter{border:1px solid #ffffff35;background:#ffffff12;color:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer}
.filter.active,.filter:hover{background:#fff;color:var(--deep)}
main{max-width:1420px;margin:22px auto;padding:0 22px 42px}.intro{display:flex;justify-content:space-between;align-items:end;gap:18px;margin-bottom:12px}
.intro h2{font-size:25px;margin:0}.updated{font-size:13px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:15px;align-items:start}
.card{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:0 3px 13px #0000000c}
.media{height:210px;display:none;background:#f3f5f6}.media.ready{display:block}.media img{width:100%;height:100%;object-fit:cover;object-position:center 18%}
.body{padding:15px}.meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;font-size:12px}.badge{padding:4px 8px;border-radius:999px;background:#edf2f4;font-weight:700}
.official{background:#e5f5ec;color:#12643b}.credible{background:#fff2d4;color:#7a5009}.reported{background:#fdeaea;color:#8e2d2d}
.card h3{font-size:20px;line-height:1.24;margin:0 0 8px}.card h3 a{color:var(--ink);text-decoration:none}.card h3 a:hover{color:var(--green);text-decoration:underline}
.card p{font-size:15px;line-height:1.55;color:#40505c;margin:0 0 14px}.sources{border-top:1px solid var(--line);padding-top:11px;font-size:13px;color:var(--muted)}
.sources a{color:var(--green);font-weight:700;text-decoration:none}.empty{display:none;background:#fff;border:1px solid var(--line);border-radius:13px;padding:28px;text-align:center;color:var(--muted)}
footer{text-align:center;color:#74808a;font-size:13px;padding:24px}
@media(max-width:1050px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:720px){.grid{grid-template-columns:1fr}.actions{max-width:none;width:100%}.search{min-width:0}.intro{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<header><div class="top"><div class="brand"><div class="logo">⚽</div><div><h1>Fotbollsbriefen</h1><div class="tag">Europas fotbollsnyheter – snabbt och kort</div></div></div>
<div class="actions"><div class="search"><input id="search" type="search" placeholder="Sök spelare, tränare, klubb eller liga…"></div><button class="refresh" id="refresh">↻ Uppdatera</button></div></div>
<nav id="filters"></nav></header>
<main><div class="intro"><h2>Senaste nytt <span id="count" style="font-size:14px;font-weight:normal;color:var(--muted)"></span></h2><div class="updated" id="updated"></div></div>
<div class="grid" id="grid"></div><div class="empty" id="empty">Inga nyheter matchar ditt urval.</div></main>
<footer>Fotbollsbriefen · Nyheter från de senaste sju dagarna</footer>
<script>
const FILTERS=["Alla","Premier League","La Liga","Serie A","Bundesliga","Ligue 1","Landslag","Transfer","Tränare"];
let data={items:[]},active="Alla";
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
function statusClass(s){if(/officiellt|bekräftat/i.test(s))return"official";if(/trovärdigt/i.test(s))return"credible";return"reported"}
function fmtDate(s){return new Date(s).toLocaleDateString("sv-SE",{day:"numeric",month:"long"})}
function renderFilters(){const n=document.getElementById("filters");n.innerHTML=FILTERS.map(f=>`<button class="filter ${f===active?"active":""}" data-f="${esc(f)}">${esc(f)}</button>`).join("");n.querySelectorAll("button").forEach(b=>b.onclick=()=>{active=b.dataset.f;renderFilters();render()})}
function render(){
 const q=document.getElementById("search").value.trim().toLowerCase(),grid=document.getElementById("grid");grid.innerHTML="";
 const items=data.items.filter(x=>(active==="Alla"||x.category.includes(active))&&(!q||(x.title+" "+x.summary+" "+x.category.join(" ")+" "+x.sources.map(s=>s.name).join(" ")).toLowerCase().includes(q)));
 items.forEach(x=>{const e=document.createElement("article");e.className="card";const image=x.image?`<div class="media ready"><img src="${esc(x.image)}" alt="${esc(x.entity||x.title)}"></div>`:"";
 e.innerHTML=`${image}<div class="body"><div class="meta">${x.category.slice(0,2).map(c=>`<span class="badge">${esc(c)}</span>`).join("")}<span class="badge ${statusClass(x.status)}">${esc(x.status)}</span><span class="badge">${fmtDate(x.published_at)}</span></div>
 <h3><a href="${esc(x.sources[0]?.url||"#")}" target="_blank" rel="noopener">${esc(x.title)}</a></h3><p>${esc(x.summary)}</p>
 <div class="sources">Källor: ${x.sources.map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}</a>`).join(" · ")}</div></div>`;grid.appendChild(e)});
 document.getElementById("count").textContent=`· ${items.length} nyheter · ${new Set(items.flatMap(x=>x.sources.map(s=>s.name))).size} källor`;
 document.getElementById("empty").style.display=items.length?"none":"block";
}
async function load(){
 const b=document.getElementById("refresh");b.disabled=true;b.textContent="↻ Uppdaterar…";
 try{const r=await fetch(`news.json?t=${Date.now()}`,{cache:"no-store"});if(!r.ok)throw 0;data=await r.json();render();document.getElementById("updated").textContent="Senast uppdaterad: "+new Date(data.updated_at).toLocaleString("sv-SE",{day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"})}
 catch(e){document.getElementById("updated").textContent="Kunde inte läsa nyhetsfilen."}
 finally{b.disabled=false;b.textContent="↻ Uppdatera"}
}
document.getElementById("search").oninput=render;document.getElementById("refresh").onclick=load;renderFilters();load();
</script></body></html>
