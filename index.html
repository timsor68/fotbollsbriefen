<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fotbollsbriefen</title>
<meta name="description" content="Korta och uppdaterade fotbollsnyheter från Europas toppligor.">
<style>
:root{--bg:#eef2f4;--paper:#fff;--ink:#13202a;--muted:#687680;--line:#dbe2e7;--green:#075f37;--deep:#07301e}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif}
header{position:sticky;top:0;z-index:20;background:var(--deep);color:#fff;box-shadow:0 3px 16px #0004}
.top{max-width:1420px;margin:auto;padding:16px 22px 11px;display:flex;gap:18px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.brand{display:flex;gap:11px;align-items:center}.logo{width:43px;height:43px;border-radius:50%;display:grid;place-items:center;background:#168b50;font-size:23px}
h1{font-size:29px;line-height:1;margin:0}.tag{font-size:13px;color:#cde8d8;margin-top:5px}
.actions{display:flex;gap:9px;align-items:center;flex:1;justify-content:flex-end;max-width:720px}.search{flex:1;min-width:240px}
.search input{width:100%;border:0;border-radius:9px;padding:12px 14px;font-size:15px}
.refresh{border:0;border-radius:9px;padding:12px 15px;background:#fff;color:var(--deep);font-weight:700;cursor:pointer;white-space:nowrap}
.refresh:disabled{opacity:.65;cursor:wait}
nav{max-width:1420px;margin:auto;padding:0 22px 13px;display:flex;gap:8px;overflow-x:auto}
.filter{border:1px solid #ffffff35;background:#ffffff12;color:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer}
.filter.active,.filter:hover{background:#fff;color:var(--deep)}
main{max-width:1420px;margin:22px auto;padding:0 22px 42px}.intro{display:flex;justify-content:space-between;align-items:end;gap:18px;margin-bottom:12px}
.intro h2{font-size:25px;margin:0}.updated{font-size:13px;color:var(--muted)}
.message{min-height:18px;margin:0 0 10px;color:var(--muted);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:15px;align-items:start}
.card{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:0 3px 13px #0000000c;align-self:start}
.media{height:210px;display:none;background:#f3f5f6}.media.ready{display:block}.media img{width:100%;height:100%;object-fit:cover;object-position:center 18%}
.media.logo img{object-fit:contain;padding:16px;background:#fff}
.body{padding:15px}.meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;font-size:12px}.badge{padding:4px 8px;border-radius:999px;background:#edf2f4;font-weight:700}
.official{background:#e5f5ec;color:#12643b}.credible{background:#fff2d4;color:#7a5009}.reported{background:#fdeaea;color:#8e2d2d}
.since{background:#dff3ff;color:#155b7a}.changed{background:#eee7ff;color:#5d3a91}
.card h3{font-size:20px;line-height:1.24;margin:0 0 8px}.card h3 a{color:var(--ink);text-decoration:none}.card h3 a:hover{color:var(--green);text-decoration:underline}
.card p{font-size:15px;line-height:1.55;color:#40505c;margin:0 0 14px}.sources{border-top:1px solid var(--line);padding-top:11px;font-size:13px;color:var(--muted)}
.sources a{color:var(--green);font-weight:700;text-decoration:none}.sourceRow{margin-top:5px}.sourceLabel{font-weight:700;color:#4b5963}.empty{display:none;background:#fff;border:1px solid var(--line);border-radius:13px;padding:28px;text-align:center;color:var(--muted)}
footer{text-align:center;color:#74808a;font-size:13px;padding:24px}
@media(max-width:1050px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:720px){.grid{grid-template-columns:1fr}.actions{max-width:none;width:100%}.search{min-width:0}.intro{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<header><div class="top"><div class="brand"><div class="logo">⚽</div><div><h1>Fotbollsbriefen</h1><div class="tag">Europas fotbollsnyheter – snabbt och kort</div></div></div>
<div class="actions"><div class="search"><input id="search" type="search" placeholder="Sök spelare, tränare, klubb eller liga…"></div><button class="refresh" id="refresh">↻ Uppdatera</button></div></div>
<nav id="filters"></nav></header>
<main><div class="intro"><h2>Senaste nytt <span id="count" style="font-size:14px;font-weight:normal;color:var(--muted)"></span></h2><div class="updated" id="updated"></div></div>
<div class="message" id="message"></div><div class="grid" id="grid"></div><div class="empty" id="empty">Inga nyheter matchar ditt urval.</div></main>
<footer>Fotbollsbriefen · Svenska fotbollsnotiser från de senaste sju dagarna</footer>
<script>
const FILTERS=["Alla","Premier League","La Liga","Serie A","Bundesliga","Ligue 1","Landslag","Transfer","Tränare"];
const VISIT_KEY="fb_last_visit_v2", STATE_KEY="fb_story_state_v2";
let data={items:[]},active="Alla",previousVisit=localStorage.getItem(VISIT_KEY),previousState={};
try{previousState=JSON.parse(localStorage.getItem(STATE_KEY)||"{}")}catch(e){}
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
const slug=s=>String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
const fingerprint=x=>JSON.stringify([x.title,x.summary,x.status,(x.sources||[]).map(s=>s.name).sort()]);
function statusClass(s){if(/officiellt|bekräftat/i.test(s))return"official";if(/trovärdigt/i.test(s))return"credible";return"reported"}
function fmtDate(s){return new Date(s).toLocaleDateString("sv-SE",{day:"numeric",month:"long"})}
function isNew(x){return !!previousVisit&&new Date(x.published_at)>new Date(previousVisit)}
function isChanged(x){return !!previousState[x.id]&&previousState[x.id]!==fingerprint(x)}
function imgCandidates(x){
 const out=[];if(x.image)out.push(x.image);
 if(x.entity&&x.entity_type)for(const ext of ["jpg","jpeg","png","webp"])out.push(`images/${x.entity_type}/${slug(x.entity)}.${ext}`);
 return out;
}
function setImage(img,wrap,candidates,i=0){
 if(i>=candidates.length)return;
 img.onload=()=>wrap.classList.add("ready");
 img.onerror=()=>setImage(img,wrap,candidates,i+1);
 img.src=candidates[i];
}
function renderFilters(){
 const n=document.getElementById("filters");
 n.innerHTML=FILTERS.map(f=>`<button class="filter ${f===active?"active":""}" data-f="${esc(f)}">${esc(f)}</button>`).join("");
 n.querySelectorAll("button").forEach(b=>b.onclick=()=>{active=b.dataset.f;renderFilters();render()});
}
function render(){
 const q=document.getElementById("search").value.trim().toLowerCase(),grid=document.getElementById("grid");grid.innerHTML="";
 const items=(data.items||[]).filter(x=>(active==="Alla"||(x.category||[]).includes(active))&&(!q||(x.title+" "+x.summary+" "+(x.category||[]).join(" ")+" "+(x.sources||[]).map(s=>s.name).join(" ")).toLowerCase().includes(q)));
 items.forEach(x=>{
  const e=document.createElement("article");e.className="card";
  e.innerHTML=`<div class="media"><img alt="${esc(x.entity||x.title)}"></div><div class="body"><div class="meta">${(x.category||[]).slice(0,2).map(c=>`<span class="badge">${esc(c)}</span>`).join("")}<span class="badge ${statusClass(x.status)}">${esc(x.status)}</span>${isNew(x)?'<span class="badge since">Ny sedan sist</span>':''}${isChanged(x)?'<span class="badge changed">Uppdaterad</span>':''}<span class="badge">${fmtDate(x.published_at)}</span></div>
  <h3><a href="${esc(x.sources?.[0]?.url||"#")}" target="_blank" rel="noopener">${esc(x.title)}</a></h3><p>${esc(x.summary)}</p>
  <div class="sources">
  ${x.main_source?`<div class="sourceRow"><span class="sourceLabel">Huvudkälla:</span> <a href="${esc(x.main_source.url)}" target="_blank" rel="noopener">${esc(x.main_source.name)}</a></div>`:`<div class="sourceRow"><span class="sourceLabel">Källa:</span> ${(x.sources||[]).slice(0,1).map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}</a>`).join("")}</div>`}
  ${(x.confirmed_by||[]).length?`<div class="sourceRow"><span class="sourceLabel">Bekräftad av:</span> ${(x.confirmed_by||[]).map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}</a>`).join(" · ")}</div>`:""}
</div></div>`;
  grid.appendChild(e);setImage(e.querySelector("img"),e.querySelector(".media"),imgCandidates(x));
 });
 document.getElementById("count").textContent=`· ${items.length} nyheter · ${new Set(items.flatMap(x=>(x.sources||[]).map(s=>s.name))).size} källor`;
 document.getElementById("empty").style.display=items.length?"none":"block";
}
async function load(){
 const b=document.getElementById("refresh"),msg=document.getElementById("message");
 b.disabled=true;b.textContent="↻ Uppdaterar…";msg.textContent="Hämtar senaste publicerade nyhetsfilen…";
 const timer=setTimeout(()=>msg.textContent="Det tar längre tid än väntat, men sidan fortsätter fungera.",7000);
 try{
  const r=await fetch(`news.json?t=${Date.now()}`,{cache:"no-store"});if(!r.ok)throw new Error("HTTP "+r.status);
  data=await r.json();render();
  document.getElementById("updated").textContent="Senast uppdaterad: "+new Date(data.updated_at).toLocaleString("sv-SE",{day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"});
  msg.textContent="Uppdaterad.";
  const state={};(data.items||[]).forEach(x=>state[x.id]=fingerprint(x));
  setTimeout(()=>{localStorage.setItem(STATE_KEY,JSON.stringify(state));localStorage.setItem(VISIT_KEY,new Date().toISOString())},4000);
 }catch(e){msg.textContent="Kunde inte läsa den nya nyhetsfilen. Senast visade innehåll ligger kvar."}
 finally{clearTimeout(timer);b.disabled=false;b.textContent="↻ Uppdatera"}
}
document.getElementById("search").oninput=render;document.getElementById("refresh").onclick=load;renderFilters();load();
</script></body></html>
