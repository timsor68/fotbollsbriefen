const fallbackNews = [
 {date:"2026-07-13",cat:"Premier League Transfer",title:"Manchester United värvar Andrey Santos från Chelsea",text:"Manchester United har värvat den brasilianske mittfältaren Andrey Santos från Chelsea. Han har skrivit kontrakt till sommaren 2031 och övergången uppges vara värd 48 miljoner pund, med ytterligare betalningar möjliga genom bonusar. Affären innebär att United får in en ung central mittfältare med erfarenhet från engelsk och internationell fotboll. För Chelsea innebär övergången att en spelare med begränsad väg till en ordinarie plats lämnar klubben permanent.",source:"Reuters",url:"https://www.reuters.com/sports/soccer/united-sign-brazil-midfielder-santos-chelsea-2026-07-13/",person:"Andrey Santos footballer",fallback:"Old Trafford stadium",status:"confirmed"},
 {date:"2026-07-13",cat:"Premier League Tränare",title:"Andoni Iraola vill se fler Liverpool-värvningar",text:"Liverpools nye tränare Andoni Iraola säger att truppen behöver förstärkas ytterligare inför säsongen 2026/27. Klubben har redan genomfört flera förändringar, men Iraola anser att det fortfarande finns positioner där konkurrensen och bredden behöver förbättras. Uttalandet signalerar att Liverpool inte ser sommarens transferarbete som avslutat. Ytterligare värvningar kan därför bli aktuella innan transferfönstret stänger.",source:"Reuters",url:"https://www.reuters.com/sports/soccer/new-liverpool-boss-iraola-says-club-need-more-signings-ahead-new-season-2026-07-13/",person:"Andoni Iraola",fallback:"Anfield stadium",status:"confirmed"},
 {date:"2026-07-13",cat:"Landslag Tränare",title:"Slaven Bilić återvänder som Kroatiens förbundskapten",text:"Kroatiens fotbollsförbund har utsett Slaven Bilić till ny förbundskapten efter Zlatko Dalićs avgång. Bilić återvänder därmed till ett uppdrag han tidigare hade mellan 2006 och 2012. Han känner både landslaget och den kroatiska fotbollsmiljön väl, men får samtidigt uppgiften att leda ett generationsskifte. Förbundet hoppas att hans erfarenhet ska skapa kontinuitet inför kommande kval och mästerskap.",source:"Reuters",url:"https://www.reuters.com/sports/soccer/bilic-returns-croatia-coach-after-dalics-exit-2026-07-13/",person:"Slaven Bilic",fallback:"Croatia national football team",status:"confirmed"},
 {date:"2026-07-11",cat:"Landslag Tränare Bundesliga",title:"Tyska förbundet förhandlar med Jürgen Klopp",text:"Tyska fotbollsförbundet har inlett formella samtal med Jürgen Klopp om jobbet som förbundskapten. Alla detaljer är ännu inte avslutade, men parterna uppges vara överens om huvuddragen i uppdraget. Klopp skulle i så fall återvända till ett tränarjobb efter sin tid i klubbfotbollen. För Tyskland vore det en profilerad rekrytering med stort fokus på ledarskap, intensitet och långsiktig lagutveckling.",source:"Reuters",url:"https://www.reuters.com/sports/soccer/german-fa-says-it-has-started-talks-with-coach-klopp-national-team-post-2026-07-11/",person:"Jürgen Klopp",fallback:"Germany national football team",status:"credible"},
 {date:"2026-07-11",cat:"La Liga Transfer",title:"Atlético Madrid värvar Morten Hjulmand",text:"Atlético Madrid har värvat den danske mittfältaren Morten Hjulmand från Sporting. Han har skrivit ett femårskontrakt och blir en långsiktig förstärkning centralt på planen. Hjulmand är framför allt känd för sitt positionsspel, sin arbetskapacitet och sin förmåga att vinna tillbaka bollen. Värvningen passar därför väl in i Atléticos intensiva spelstil och ger klubben fler alternativ i det centrala mittfältet.",source:"Reuters",url:"https://www.reuters.com/sports/soccer/atletico-madrid-sign-denmark-midfielder-hjulmand-sporting-2026-07-11/",person:"Morten Hjulmand",fallback:"Metropolitano Stadium Madrid",status:"confirmed"},
 {date:"2026-07-11",cat:"Serie A Landslag Klubbledning",title:"Paolo Maldini blir teknisk direktör för Italien",text:"Italiens fotbollsförbund har anställt Paolo Maldini som teknisk direktör på ett avtal som löper till 2028. Den tidigare landslagskaptenen ska arbeta med den övergripande sportsliga riktningen och delta i processen att utse en ny förbundskapten. Rollen ger Maldini inflytande över både seniorlandslaget och den långsiktiga spelarutvecklingen. Förbundet hoppas att hans erfarenhet från elitfotboll och klubbledning ska bidra till en tydligare struktur.",source:"Reuters",url:"https://www.reuters.com/sports/soccer/maldini-named-technical-director-italian-federation-2026-07-11/",person:"Paolo Maldini",fallback:"Italy national football team",status:"confirmed"},
 {date:"2026-07-10",cat:"Premier League Klubbledning",title:"Michael Edwards lämnar sin fotbollsroll hos FSG",text:"Michael Edwards har lämnat uppdraget som fotbollschef hos Liverpoolägaren Fenway Sports Group. Han har under flera perioder haft en central roll i klubbens rekrytering, sportsliga strategi och långsiktiga planering. Avhoppet innebär därför en betydande förändring bakom kulisserna, även om den dagliga verksamheten fortsätter under den övriga sportledningen. FSG behöver nu besluta hur Edwards ansvar ska fördelas och om en ersättare ska rekryteras.",source:"Reuters",url:"https://www.reuters.com/sports/soccer/edwards-leaves-role-ceo-football-liverpool-owners-fsg-2026-07-10/",person:"Michael Edwards Liverpool",fallback:"Anfield stadium",status:"confirmed"},
 {date:"2026-07-09",cat:"Premier League Transfer",title:"Brentford värvar Callum Wilson",text:"Brentford har skrivit ett ettårskontrakt med anfallaren Callum Wilson, som ansluter utan övergångssumma efter att ha lämnat West Ham. Wilson tillför Premier League-erfarenhet och ger klubben ett mer rutinerat alternativ i anfallet. Det korta avtalet begränsar samtidigt Brentfords ekonomiska risk. Värvningen kan bli särskilt värdefull om klubben vill rotera mer eller behöver täcka upp vid skador under säsongen.",source:"Reuters",url:"https://www.reuters.com/sports/soccer/brentford-sign-striker-callum-wilson-free-transfer-after-west-ham-exit-2026-07-09/",person:"Callum Wilson footballer",fallback:"Brentford Community Stadium",status:"confirmed"},
 {date:"2026-07-09",cat:"Fotbollspolitik",title:"Europeiska spelarfack lämnar FIFA-process",text:"Spelarfack från 17 europeiska länder har dragit tillbaka sitt stöd för en grupptalan mot FIFA efter att parterna nått en överenskommelse om förändringar i transferreglerna. Beslutet innebär att den aktuella rättsliga processen inte drivs vidare av förbunden. Frågan har handlat om spelarnas rättigheter när kontrakt bryts och om hur ekonomiska sanktioner ska utformas. Överenskommelsen kan få betydelse för framtida övergångar och tvister mellan spelare och klubbar.",source:"Reuters",url:"https://www.reuters.com/sports/soccer/european-player-unions-withdraw-fifa-lawsuit-following-transfer-reforms-2026-07-09/",person:"",fallback:"FIFA headquarters",status:"confirmed"},
 {date:"2026-07-08",cat:"Premier League Transfer",title:"Leeds värvar Harry Wilson från Fulham",text:"Leeds har värvat den walesiske landslagsmannen Harry Wilson från Fulham. Han har skrivit ett fyraårskontrakt och blir klubbens första nyförvärv under sommarens transferfönster. Wilson kan spela på flera offensiva positioner och är även ett hot i fasta situationer. Värvningen ger Leeds mer erfarenhet, kreativitet och flexibilitet i offensiven inför den kommande Premier League-säsongen.",source:"Reuters",url:"https://www.reuters.com/sports/soccer/leeds-sign-wilson-fulham-four-year-deal-2026-07-08/",person:"Harry Wilson footballer",fallback:"Elland Road stadium",status:"confirmed"},
 {date:"2026-07-07",cat:"Ligue 1 Tränare",title:"Liam Rosenior tar över Paris FC",text:"Paris FC har utsett Liam Rosenior till ny huvudtränare på ett avtal som löper till juni 2028. Han får ett tydligt långsiktigt mandat att utveckla lagets spel och bygga vidare på klubbens etablering i Ligue 1. Rosenior har tidigare arbetat med både unga spelare och lag som vill spela en passningsorienterad fotboll. Hans första uppgift blir att bedöma truppen och prioritera sommarens rekryteringar.",source:"Reuters",url:"https://www.reuters.com/sports/soccer/former-chelsea-boss-rosenior-appointed-paris-fc-manager-2026-07-07/",person:"Liam Rosenior",fallback:"Paris FC stadium",status:"confirmed"},
 {date:"2026-07-13",cat:"Premier League Transfer",title:"Manchester United bekräftar värvningen av Andrey Santos",text:"Manchester United har på sin officiella webbplats bekräftat att Andrey Santos ansluter från Chelsea, under förutsättning att registreringen slutförs. Den brasilianske landslagsmittfältaren har skrivit ett långt avtal och presenterades samma dag av klubben. Den officiella bekräftelsen kompletterar tidigare uppgifter om övergångssumman och visar att affären nu gått från rapporterad övergång till slutförd värvning.",source:"Manchester United",url:"https://www.manutd.com/en/news/andrey-santos-signs-for-manchester-united",person:"Andrey Santos footballer",fallback:"Old Trafford stadium",status:"confirmed"},
 {date:"2026-07-13",cat:"Serie A Transfer",title:"Paulo Dybala förlänger med Roma",text:"Roma har enligt Gianluca Di Marzios rapportering slutfört förlängningen med Paulo Dybala. Spelarens representant befann sig på Trigoria för att färdigställa de sista detaljerna innan avtalet undertecknades. Förlängningen innebär att Roma behåller en av lagets mest kreativa och profilerade offensiva spelare. Klubben får samtidigt kontinuitet i ett lagbygge där erfarenhet och individuell kvalitet fortsatt är centrala delar.",source:"Gianluca Di Marzio",url:"https://www.gianlucadimarzio.com/calciomercato/",person:"Paulo Dybala",fallback:"Stadio Olimpico Rome",status:"credible"},
 {date:"2026-07-13",cat:"Serie A Transfer",title:"Lazio arbetar för att slutföra värvningen av Danilho Doekhi",text:"Lazio arbetar enligt Gianluca Di Marzio för att nå en slutlig överenskommelse om mittbacken Danilho Doekhi. Ett nytt möte med spelarens klubb väntas bli avgörande för om parterna kan enas om villkoren. Doekhi skulle ge Lazio mer fysik, luftstyrka och konkurrens i mittförsvaret. Affären är ännu inte officiell och ska därför ses som en pågående förhandling.",source:"Gianluca Di Marzio",url:"https://www.gianlucadimarzio.com/calciomercato/",person:"Danilho Doekhi",fallback:"Stadio Olimpico Rome",status:"credible"},
 {date:"2026-07-13",cat:"Serie A Transfer",title:"Inter avvisar Kölns bud på Iddrissou",text:"Inter har enligt Gianluca Di Marzio avvisat ett bud från Köln på den unge anfallaren Matteo Iddrissou. Även Brentford och Wolfsburg uppges följa spelaren. Situationen visar att Inter värderar honom högt och inte vill sälja på nuvarande villkor. Nästa steg blir att se om någon av de intresserade klubbarna återkommer med ett förbättrat erbjudande.",source:"Gianluca Di Marzio",url:"https://www.gianlucadimarzio.com/calciomercato/",person:"Matteo Iddrissou footballer",fallback:"San Siro stadium",status:"credible"},
 {date:"2026-07-12",cat:"Premier League Transfer",title:"Muharemović väljer mellan tre engelska klubbar",text:"Tarik Muharemović väntas enligt Gianluca Di Marzio fatta beslut om sin framtid under veckan. Leeds, Bournemouth och Sunderland finns bland alternativen för försvararen. Intresset från flera engelska klubbar ger hans nuvarande klubb ett starkare förhandlingsläge, samtidigt som spelaren behöver väga möjlig speltid mot klubbarnas sportsliga nivå och långsiktiga planer.",source:"Gianluca Di Marzio",url:"https://www.gianlucadimarzio.com/calciomercato/",person:"Tarik Muharemovic",fallback:"Premier League stadium",status:"credible"},
 {date:"2026-07-11",cat:"La Liga Transfer",title:"Atlético Madrid presenterar Morten Hjulmand",text:"Atlético Madrid har på sin officiella webbplats presenterat Morten Hjulmand som ny spelare. Den danske defensive mittfältaren ansluter från Sporting CP och har skrivit kontrakt till den 30 juni 2031. Klubben lyfter fram hans fysik, bollvinnande förmåga och speluppfattning. Den officiella presentationen bekräftar därmed de tidigare transferuppgifterna.",source:"Atlético Madrid",url:"https://en.atleticodemadrid.com/noticias/welcome-hjulmand",person:"Morten Hjulmand",fallback:"Metropolitano Stadium Madrid",status:"confirmed"},
 {date:"2026-07-11",cat:"Premier League Tränare",title:"Liverpool publicerar Andoni Iraolas första presskonferens",text:"Liverpool har publicerat Andoni Iraolas första presskonferens som klubbens huvudtränare. Där utvecklade han sin syn på truppen, försäsongen och behovet av ytterligare förstärkningar. Uttalandena ger en tydligare bild av hur han vill forma laget och visar att klubbens transferarbete fortsatt är aktivt. Den officiella klubbkällan kompletterar tidigare rapportering från nyhetsmedier.",source:"Liverpool FC",url:"https://www.liverpoolfc.com/news",person:"Andoni Iraola",fallback:"Anfield stadium",status:"confirmed"},
 {date:"2026-07-07",cat:"Ligue 1 Tränare",title:"Paris FC bekräftar Liam Rosenior som ny tränare",text:"Paris FC har på sin officiella webbplats bekräftat att Liam Rosenior blir ny huvudtränare för herrlaget. Han har skrivit kontrakt till juni 2028 och tillträder i samband med lagets återstart av träningen. Klubben beskriver honom som en modern tränare med starkt fokus på spelarutveckling, tydligt ledarskap och offensiv fotboll.",source:"Paris FC",url:"https://parisfc.fr/equipe-pro/le-paris-fc-ouvre-un-nouveau-chapitre-de-son-projet-avec-la-nomination-de-liam-rosenior/",person:"Liam Rosenior",fallback:"Paris FC stadium",status:"confirmed"},
 {date:"2026-07-13",cat:"Premier League Transfer",title:"Fabrizio Romano: Éderson blir kvar i Atalanta",text:"Fabrizio Romano uppger att den brasilianske mittfältaren Éderson inte kommer att ansluta till Manchester United. Atalanta har i stället erbjudit honom ett nytt kontrakt till sommaren 2031, och fortsatta förhandlingar väntar. Uppgiften innebär att United behöver gå vidare med andra alternativ på det centrala mittfältet. För Atalanta är målet att behålla en av lagets viktigaste spelare och samtidigt stärka klubbens position inför framtida bud.",source:"Fabrizio Romano",url:"https://x.com/FabrizioRomano",person:"Éderson Atalanta footballer",fallback:"Gewiss Stadium Bergamo",status:"credible"},
 {date:"2026-07-12",cat:"Transfer",title:"Fabrizio Romano: Omar Touré klar för Watford",text:"Fabrizio Romano rapporterar att Watford har nått en överenskommelse med försvararen Omar Touré, som ansluter från Heidenheim utan övergångssumma. Kontraktet ska löpa till juni 2029. Touré väntas resa till London för att genomföra de sista stegen innan presentationen. Värvningen ger Watford ytterligare ett alternativ i försvaret och innebär en förhållandevis låg ekonomisk risk eftersom ingen transfersumma betalas.",source:"Fabrizio Romano",url:"https://x.com/FabrizioRomano/status/2075713642415231002",person:"Omar Toure footballer Heidenheim",fallback:"Vicarage Road stadium",status:"credible"},
 {date:"2026-07-11",cat:"Serie A Transfer",title:"Fabrizio Romano: Torino får bud på Ben Nelson avvisat",text:"Torino har enligt Fabrizio Romano lämnat ett formellt bud på Leicesterförsvararen Ben Nelson, men erbjudandet har avvisats. Nelson uppges vilja lämna klubben och har tackat nej till ett nytt kontrakt. Leicester behöver därför avgöra om klubben ska höja sina krav eller riskera att spelarens marknadsvärde sjunker när avtalet närmar sig sitt slut. Förhandlingarna kan fortsätta om Torino återkommer med ett förbättrat bud.",source:"Fabrizio Romano",url:"https://x.com/FabrizioRomano/status/2075585940593004962",person:"Ben Nelson Leicester footballer",fallback:"King Power Stadium",status:"credible"},
 {date:"2026-07-11",cat:"Premier League Transfer",title:"Manchester City värvar Jeremy Monga från Leicester",text:"Manchester City har slutfört värvningen av den 17-årige yttern Jeremy Monga från Leicester. David Ornstein rapporterade först att klubbarna nått en överenskommelse, och affären har därefter bekräftats. Monga räknas som en av Englands mest lovande unga offensiva spelare och har redan erfarenhet från seniorfotboll. City ser värvningen som en långsiktig investering med möjlighet till gradvis utveckling i klubbens elitmiljö.",source:"David Ornstein / The Athletic",url:"https://x.com/David_Ornstein",person:"Jeremy Monga footballer",fallback:"Etihad Stadium Manchester",status:"confirmed"},

function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('sv-SE',{day:'numeric',month:'long'})}
function escapeHtml(s=''){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function stripHtml(s=''){const d=document.createElement('div');d.innerHTML=s;return (d.textContent||'').replace(/\s+/g,' ').trim()}
function sourceFromTitle(t=''){const m=t.match(/ - ([^-]+)$/);return m?m[1].trim():'Nyhetskälla'}
function cleanTitle(t=''){return t.replace(/ - [^-]+$/,'').trim()}
function normalizeTitle(t=''){
 return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/\b(fc|football|soccer|report|reports|says|according|exclusive|latest)\b/g,'')
  .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}

function storyId(n){return normalizeTitle(n.title).slice(0,140)}
function storyFingerprint(n){
 return (normalizeTitle(n.title)+'|'+(n.text||'').toLowerCase().replace(/\s+/g,' ').trim()+'|'+
  ((n.sources||[]).map(x=>x.name).sort().join(','))).slice(0,1200);
}
function isNewSinceLast(n){
 if(!previousVisit)return false;
 return new Date(n.date+'T23:59:59').getTime()>new Date(previousVisit).getTime();
}
function isUpdatedStory(n){
 const old=previousStoryState[storyId(n)];
 return !!old && old!==storyFingerprint(n);
}

 const x=t.toLowerCase(),c=[];
 if(/manchester|liverpool|arsenal|chelsea|tottenham|newcastle|aston villa|premier league/.test(x))c.push('Premier League');
 if(/barcelona|real madrid|atletico|la liga/.test(x))c.push('La Liga');
 if(/juventus|milan|inter|napoli|serie a/.test(x))c.push('Serie A');
 if(/bayern|dortmund|leverkusen|bundesliga/.test(x))c.push('Bundesliga');
 if(/psg|marseille|monaco|strasbourg|ligue 1/.test(x))c.push('Ligue 1');
 if(/transfer|sign|signing|move|deal|bid|joins|värv/.test(x))c.push('Transfer');
 if(/manager|coach|head coach|tränare|boss/.test(x))c.push('Tränare');
 if(/director|sporting director|chief executive|sportchef/.test(x))c.push('Klubbledning');
 return c.join(' ')||'Fotboll';
}
function isResultStory(t=''){return /\b(vs|score|result|highlights|table|standings|beat|defeat|win over|draw with|match report|final score)\b/i.test(t)}
function statusForGroup(group){
 if(group.some(x=>/official|club|reuters|bbc/i.test(x.source)))return 'confirmed';
 if(group.some(x=>/ornstein|athletic|romano|di marzio|simon stone|sky sport/i.test(x.source)))return 'credible';
 return 'developing';
}
function statusLabel(s){return s==='confirmed'?'Bekräftat':s==='credible'?'Mycket trovärdigt':'Under utveckling'}
function mergeGroups(items){
 const groups=[];
 [...items].sort((a,b)=>(sourceWeight[b.source]||50)-(sourceWeight[a.source]||50)).forEach(item=>{
  const keyWords=normalizeTitle(item.title).split(' ').filter(w=>w.length>4);
  let group=groups.find(g=>{
    const gw=normalizeTitle(g[0].title).split(' ');
    const overlap=keyWords.filter(w=>gw.includes(w)).length;
    const samePerson=item.person && g[0].person &&
      normalizeTitle(item.person)===normalizeTitle(g[0].person);
    return samePerson || overlap>=Math.min(3,Math.max(2,keyWords.length-1));
  });
  if(group)group.push(item);else groups.push([item]);
 });
 return groups.map(group=>{
  group.sort((a,b)=>(sourceWeight[b.source]||50)-(sourceWeight[a.source]||50));
  const lead={...group[0]};
  lead.sources=group.map(x=>({name:x.source,url:x.url,date:x.date,title:x.title}));
  lead.status=statusForGroup(group);
  if(group.length>1){
    const additions=group.slice(1).map(x=>x.text).filter(Boolean);
    const sentences=[];
    [lead.text,...additions].join(' ').split(/(?<=[.!?])\s+/).forEach(s=>{
      const key=s.toLowerCase().replace(/[^a-zåäö0-9 ]/g,'').slice(0,100);
      if(s.length>25 && !sentences.some(x=>x.key===key))sentences.push({key,text:s});
    });
    lead.text=sentences.map(x=>x.text).join(' ').replace(/\s+/g,' ').slice(0,1050);
  }
  return lead;
 });
}
function render(){
 const q=document.getElementById('search').value.trim().toLowerCase();
 const grid=document.getElementById('grid');grid.innerHTML='';let shown=0;
 const grouped=mergeGroups(news).sort((a,b)=>new Date(b.date)-new Date(a.date));
 grouped.forEach(n=>{
  const f=active==='alla'||n.cat.toLowerCase().includes(active.toLowerCase());
  const s=!q||(n.title+' '+n.text+' '+n.cat+' '+n.sources.map(x=>x.name).join(' ')).toLowerCase().includes(q);
  if(!f||!s)return;shown++;
  const cls=n.status==='confirmed'?'confirmed':n.status==='credible'?'credible':'developing';
  const sources=[...new Map(n.sources.map(x=>[x.name,x])).values()].map(x=>`<a href="${escapeHtml(x.url)}" target="_blank" rel="noopener">${escapeHtml(x.name)}</a>`).join(' · ');
  const timeline=n.sources.length>1?`
   <div class="more"><button class="timelineBtn">Visa utvecklingen (${n.sources.length})</button>
   <ul class="timeline">${n.sources.map(x=>`<li><time>${fmtDate(x.date)}</time> – ${escapeHtml(x.name)}: ${escapeHtml(x.title)}</li>`).join('')}</ul></div>`:'';
  const el=document.createElement('article');el.className='card';
  el.innerHTML=`<div class="media"><img alt=""><div class="credit"></div></div>
   <div class="body"><div class="meta"><span class="badge">${escapeHtml(n.cat.split(' ')[0])}</span>
   ${n.cat.includes('Transfer')?'<span class="badge">Transfer</span>':''}
   <span class="badge ${cls}">${statusLabel(n.status)}</span>
   ${isNewSinceLast(n)?'<span class="badge since">Ny sedan sist</span>':''}
   ${isUpdatedStory(n)?'<span class="badge changed">Uppdaterad</span>':''}
   <span class="badge">${fmtDate(n.date)}</span></div>
   <h3><a href="${escapeHtml(n.url)}" target="_blank" rel="noopener">${escapeHtml(n.title)}</a></h3>
   <p>${escapeHtml(n.text)}</p>
   <div class="source">Källor: ${sources}${timeline}</div></div>`;
  grid.appendChild(el);
  const btn=el.querySelector('.timelineBtn');
  if(btn)btn.onclick=()=>{const t=el.querySelector('.timeline');t.classList.toggle('open');btn.textContent=t.classList.contains('open')?'Dölj utvecklingen':`Visa utvecklingen (${n.sources.length})`};
  if(n.person||n.fallback)loadImage(el,n.person,n.fallback);
 });
 document.getElementById('empty').style.display=shown?'none':'block';
 const visibleSources=new Set();
 grouped.forEach(n=>{
  const f=active==='alla'||n.cat.toLowerCase().includes(active.toLowerCase());
  const s=!q||(n.title+' '+n.text+' '+n.cat+' '+n.sources.map(x=>x.name).join(' ')).toLowerCase().includes(q);
  if(f&&s)n.sources.forEach(x=>visibleSources.add(x.name));
 });
 document.getElementById('articleCount').textContent='· '+shown+' nyheter · '+visibleSources.size+' källor';
}
async function fetchTextWithTimeout(url, timeoutMs=9000){
 const controller=new AbortController();
 const timer=setTimeout(()=>controller.abort(),timeoutMs);
 try{
  const response=await fetch(url,{cache:'no-store',signal:controller.signal});
  if(!response.ok)throw new Error('HTTP '+response.status);
  return await response.text();
 }finally{clearTimeout(timer)}
}
async function fetchRSS(){
 const cutoff=Date.now()-7*86400000,all=[];
 const tasks=feedConfigs.map(async cfg=>{
  let feedUrl;
  if(cfg.type==="direct") feedUrl=cfg.url;
  else feedUrl='https://news.google.com/rss/search?q='+encodeURIComponent(cfg.query)+'&hl=en-GB&gl=GB&ceid=GB:en';
  const candidates=[feedUrl,proxy(feedUrl),'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(feedUrl)];
  let xml='';
  for(const candidate of candidates){
   try{
    xml=await fetchTextWithTimeout(candidate,7000);
    if(xml&&/<rss|<feed/i.test(xml))break;
   }catch(e){}
  }
  if(!xml)return [];
  try{
   const doc=new DOMParser().parseFromString(xml,'text/xml');
   const found=[];
   [...doc.querySelectorAll('item,entry')].forEach(item=>{
    const rawTitle=item.querySelector('title')?.textContent||'';
    const pub=item.querySelector('pubDate,published,updated')?.textContent||'';
    const linkNode=item.querySelector('link');
    const link=linkNode?.textContent||linkNode?.getAttribute('href')||'';
    const desc=stripHtml(item.querySelector('description,summary,content')?.textContent||'');
    const d=new Date(pub);
    if(!rawTitle||!link||isNaN(d)||d.getTime()<cutoff||isResultStory(rawTitle))return;
    let source=cfg.sourceOverride||sourceFromTitle(rawTitle);
    if(/David Ornstein/i.test(rawTitle+' '+desc))source="David Ornstein / The Athletic";
    else if(/Fabrizio Romano/i.test(rawTitle+' '+desc))source="Fabrizio Romano";
    else if(/Gianluca Di Marzio|Di Marzio/i.test(rawTitle+' '+desc))source="Gianluca Di Marzio";
    else if(/Simon Stone/i.test(rawTitle+' '+desc))source="Simon Stone / BBC Sport";
    found.push({
      date:d.toISOString().slice(0,10),
      cat:guessCat(rawTitle),
      title:cleanTitle(rawTitle),
      text:(desc||'Läs den fullständiga artikeln hos källan.').slice(0,700),
      source,url:link,person:'',fallback:'',status:'developing'
    });
   });
   return found;
  }catch(e){return []}
 });
 const batches=await Promise.all(tasks);
 batches.forEach(batch=>all.push(...batch));
 const seen=new Set(),unique=[];
 all.sort((a,b)=>(sourceWeight[b.source]||50)-(sourceWeight[a.source]||50)||new Date(b.date)-new Date(a.date)).forEach(n=>{
  const key=normalizeTitle(n.title).slice(0,120);
  const sourceKey=key+'|'+n.source;
  if(seen.has(sourceKey))return;
  seen.add(sourceKey);
  unique.push(n);
 });
 return unique.slice(0,160);
}
function mergeWithFallback(live){
 const combined=[...live,...fallbackNews],seen=new Set(),out=[];
 combined.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(n=>{
  const key=normalizeTitle(n.title).slice(0,120);
  const sourceKey=key+'|'+n.source;
  if(seen.has(sourceKey))return;
  seen.add(sourceKey);
  out.push(n);
 });
 return out;
}
async function updateNews(manual=true){
 const btn=document.getElementById('refresh');
 const status=document.getElementById('refreshStatus');
 btn.disabled=true;btn.classList.add('loading');btn.innerHTML='<span class="spin">↻</span> Uppdaterar…';
 status.textContent='Kontrollerar de senaste fotbollsnyheterna…';
 const hardStop=setTimeout(()=>{
   status.textContent='Hämtningen tar längre tid än väntat. Du kan fortsätta läsa medan kontrollen avslutas.';
 },10000);
 try{
  const live=await fetchRSS();
  if(live.length){
   news=mergeWithFallback(live);pendingNews=news;render();
   const now=new Date();
   localStorage.setItem('fb_last_update',now.toISOString());
   document.getElementById('updated').textContent='Senast uppdaterad: '+now.toLocaleString('sv-SE',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
   const sourceCount=new Set(live.map(x=>x.source)).size;
   status.textContent='Klart – '+live.length+' aktuella träffar från '+sourceCount+' källor kontrollerades.';
  }else{
   status.textContent='Inga nya träffar kunde hämtas. Senast sparade innehåll visas fortfarande.';
  }
 }catch(e){
  status.textContent='Uppdateringen kunde inte slutföras. Senast sparade innehåll visas fortfarande.';
 }finally{
  clearTimeout(hardStop);
  btn.disabled=false;btn.classList.remove('loading');btn.innerHTML='<span class="spin">↻</span> Uppdatera';
 }
}
async function silentCheck(){
 let live=[];
 try{live=await fetchRSS()}catch(e){return}
 if(!live.length)return;
 const current=new Set(news.map(n=>normalizeTitle(n.title))),fresh=live.filter(n=>!current.has(normalizeTitle(n.title)));
 if(fresh.length){
  pendingNews=mergeWithFallback(live);
  const box=document.getElementById('notice');box.textContent=fresh.length+' nya nyheter finns – klicka för att uppdatera';box.style.display='block';
 }
}
document.getElementById('refresh').onclick=()=>updateNews(true);
document.getElementById('notice').onclick=()=>{if(pendingNews.length){news=pendingNews;render();document.getElementById('notice').style.display='none';document.getElementById('updated').textContent='Senast uppdaterad: '+new Date().toLocaleString('sv-SE',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'})}};
document.getElementById('search').oninput=render;
document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{document.querySelectorAll('.filter').forEach(x=>x.classList.remove('active'));b.classList.add('active');active=b.dataset.filter;render()});

function plain(s=''){return s.replace(/<[^>]*>/g,' ').replace(/&[^;]+;/g,' ').replace(/\s+/g,' ').trim()}
async function commons(query,kind){
 if(!query)return null;
 const p=new URLSearchParams({action:'query',generator:'search',gsrsearch:query,gsrnamespace:'6',gsrlimit:'10',prop:'imageinfo',iiprop:'url|extmetadata',iiurlwidth:'900',format:'json',origin:'*'});
 const data=await fetch('https://commons.wikimedia.org/w/api.php?'+p).then(r=>r.json()),pages=Object.values(data.query?.pages||{}),words=query.toLowerCase().split(/\s+/).filter(x=>x.length>3);
 return pages.find(page=>{
  const info=page.imageinfo?.[0],m=info?.extmetadata||{};if(!info?.thumburl)return false;
  const lic=(m.LicenseShortName?.value||'')+' '+(m.UsageTerms?.value||'');if(!/cc0|public domain|cc by|cc-by|creative commons/i.test(lic))return false;
  const hay=plain((page.title||'')+' '+(m.ImageDescription?.value||'')).toLowerCase(),matches=words.filter(w=>hay.includes(w)).length;
  if(kind==='person')return matches>=Math.min(2,words.length);
  return matches>=1&&/stadium|stade|stadion|arena|ground|logo|crest|badge|team/i.test(hay);
 });
}
async function loadImage(card,person,fallback){
 try{
  let hit=await commons(person,'person'),kind='person';
  if(!hit){hit=await commons(fallback,'fallback');kind=/stadium|stade|stadion|arena|ground/i.test(fallback)?'stadium':'logo'}
  if(!hit)return;
  const info=hit.imageinfo[0],m=info.extmetadata||{},media=card.querySelector('.media'),img=media.querySelector('img');
  media.classList.add(kind);img.src=info.thumburl;img.alt=person||fallback;
  media.querySelector('.credit').textContent='Bild: '+plain(m.Artist?.value||'Wikimedia Commons')+' · '+plain(m.LicenseShortName?.value||'fri licens');
  img.onload=()=>media.classList.add('ready');
 }catch(e){}
}

 const grouped=mergeGroups(news);
 const state={};
 grouped.forEach(n=>state[storyId(n)]=storyFingerprint(n));
 localStorage.setItem(STORY_STATE_KEY,JSON.stringify(state));
 localStorage.setItem(LAST_VISIT_KEY,new Date().toISOString());

setInterval(silentCheck,3*60*60*1000);
