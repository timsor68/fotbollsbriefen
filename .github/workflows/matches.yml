name: Uppdatera matcher, tabeller och prognoser

on:
  schedule:
    - cron: '0 */3 * * *' # Var 3:e timme
  workflow_dispatch: # Gör att du kan starta uppdateringen manuellt från GitHubs hemsida

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check ut kod
      uses: actions/checkout@v4

    - name: Installera Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kör matches-script
      run: python matches.py
      env:
        FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}

    - name: Commit och pusha ändringar till GitHub
      run: |
        git config --global user.name 'fotbollsbriefen-bot'
        git config --global user.email 'bot@fotbollsbriefen.se'
        if [ -f matches.json ]; then
          git add matches.json
          git commit -m "Uppdatera matcher, tabeller och prognoser" || echo "Inga ändringar att committa."
          git push
        else
          echo "matches.json skapades inte den här körningen (kontrollera FOOTBALL_DATA_API_KEY-secreten och loggen ovan) — inget att committa."
        fi
