name: Uppdatera fotbollsnyheter

on:
  schedule:
    - cron: '0 * * * *' # Körs en gång i timmen
  workflow_dispatch: # Gör att du kan starta uppdateringen manuellt från GitHubs hemsida

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check ut kod
      uses: actions/checkout@v4

    - name: Installera Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kör uppdatering script
      run: python update.py

    - name: Commit och pusha ändringar till Github
      run: |
        git config --global user.name 'fotbollsbriefen-bot'
        git config --global user.email 'bot@fotbollsbriefen.se'
        git add news.json
        git commit -m "Uppdatera nyheter" || exit 0
        git push
