name: Uppdatera väderprognoser för matcher

on:
  schedule:
    - cron: '0 */5 * * *' # Var 5:e timme — lägst prioritet, väder behöver inte vara superfärskt
  workflow_dispatch: # Gör att du kan starta uppdateringen manuellt från GitHubs hemsida

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check ut kod
      uses: actions/checkout@v4

    - name: Installera Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kör weather-script
      run: python weather.py

    - name: Commit och pusha ändringar till GitHub
      run: |
        git config --global user.name 'fotbollsbriefen-bot'
        git config --global user.email 'bot@fotbollsbriefen.se'
        added=0
        if [ -f weather.json ]; then git add weather.json; added=1; fi
        if [ -f venues_cache.json ]; then git add venues_cache.json; added=1; fi
        if [ "$added" = "1" ]; then
          git commit -m "Uppdatera väderprognoser" || echo "Inga ändringar att committa."
          git push
        else
          echo "Ingen väderdata skapades den här körningen (troligen saknas matches.json ännu — kör matches-workflow först) — inget att committa."
        fi
